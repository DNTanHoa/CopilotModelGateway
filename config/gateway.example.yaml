gateway:
  host: 127.0.0.1
  port: 4000
  require_auth: true
  master_key_env: GATEWAY_MASTER_KEY
  routing_strategy: simple-shuffle
  request_timeout_seconds: 120

# A profile represents one provider account/key. Multiple profiles may expose
# the same alias; LiteLLM then sees multiple deployments behind that alias.
profiles:
  - id: deepseek-primary
    label: DeepSeek Official - primary
    enabled: true
    api_key_env: DEEPSEEK_API_KEY_1
    api_base: https://api.deepseek.com
    models:
      - alias: deepseek-v4-flash
        model: deepseek/deepseek-v4-flash
        enabled: true
      - alias: deepseek-v4-pro
        model: deepseek/deepseek-v4-pro
        enabled: true

  - id: deepseek-secondary
    label: DeepSeek Official - secondary
    enabled: true
    api_key_env: DEEPSEEK_API_KEY_2
    api_base: https://api.deepseek.com
    models:
      - alias: deepseek-v4-flash
        model: deepseek/deepseek-v4-flash
        enabled: true
      - alias: deepseek-v4-pro
        model: deepseek/deepseek-v4-pro
        enabled: true

  - id: gemini-primary
    label: Google AI Studio
    enabled: true
    api_key_env: GEMINI_API_KEY_1
    models:
      - alias: gemini-3.5-flash
        model: gemini/gemini-3.5-flash
        enabled: true
      - alias: gemini-3.1-flash-lite
        model: gemini/gemini-3.1-flash-lite
        enabled: true

  - id: openai-primary
    label: OpenAI
    enabled: true
    api_key_env: OPENAI_API_KEY_1
    models:
      - alias: openai-coding
        model: openai/gpt-5.6-luna
        enabled: true

  # Example for any OpenAI-compatible server. Set enabled=true and edit the
  # base URL/model name when you need it.
  - id: custom-openai-compatible
    label: Custom OpenAI-compatible endpoint
    enabled: false
    api_key_env: CUSTOM_API_KEY_1
    api_base: http://127.0.0.1:8000/v1
    models:
      - alias: custom-coding
        model: openai/your-model-id
        enabled: true
